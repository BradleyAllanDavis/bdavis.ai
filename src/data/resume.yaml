# =============================================================================
# Resume content store — single source of truth
# =============================================================================
# Every reusable unit (summary fragment, experience bullet, project, skill) is
# tagged by THEME and STRENGTH so render.py can assemble a role-framed, one-page
# resume per PROFILE (see profiles/*.yaml) without hand-editing LaTeX.
#
# THEMES (the tag vocabulary — keep this list closed; profiles weight these):
#   ai-native            AI/agent engineering: MCP, agent orchestration, LLM apps
#   backend              core backend: services, APIs, data, Java/Spring
#   distributed-systems  scale, events, Kafka, multi-region, reliability
#   infra                platform/infra: cloud, containers, homelab, IaC
#   leadership           tech lead, architecture ownership, mentoring
#   payments             payments/fintech domain
#   devex                developer experience, tooling, build/CI
#
# STRENGTH: 1-5, how strong/impressive the unit is on its own (tie-breaker +
#   selection weight). 5 = headline-grade, 1 = filler.
#
# TEXT MARKUP (processed by render.py, so author in plain prose):
#   **bold**   -> \textbf{}   (use sparingly, for the metric/impact phrase)
#   Do NOT use em dashes in bullet bodies (policy): use commas, colons, parens.
#   Em dashes ARE allowed in cvevent `title` lines (rendered as LaTeX ---).
#   Special chars (% & $ # _ etc.) are auto-escaped; just type them normally.
# =============================================================================

basics:
